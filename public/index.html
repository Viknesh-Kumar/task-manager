<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Organize Your Work</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">✓</span>
                <span class="logo-text">Tasks</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item active" data-view="projects">
                📋 My Projects
            </button>
            <button class="nav-item" data-view="today">
                📅 Today
            </button>
            <button class="nav-item" data-view="upcoming">
                🗓️ Upcoming
            </button>
        </nav>

        <div class="sidebar-projects">
            <div class="projects-header">
                <h3>Projects</h3>
                <button class="btn-icon" id="newProjectBtn" title="New Project">+</button>
            </div>
            <div class="projects-list" id="projectsList"></div>
        </div>

        <div class="sidebar-footer">
            <button class="btn-icon" id="themeToggle" title="Toggle dark mode">🌙</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Projects View -->
        <div id="projectsView" class="view active">
            <div class="view-header">
                <h1>My Projects</h1>
                <button class="btn btn-primary" id="createProjectBtn">+ New Project</button>
            </div>
            <div class="projects-grid" id="projectsGrid"></div>
        </div>

        <!-- Kanban View -->
        <div id="kanbanView" class="view">
            <div class="kanban-container">
                <div class="kanban-header">
                    <h1 id="kanbanTitle">Project</h1>
                    <div class="kanban-controls">
                        <button class="btn-icon" id="backBtn" title="Back">←</button>
                    </div>
                </div>

                <div class="kanban-board">
                    <!-- To Do Column -->
                    <div class="kanban-column" data-status="todo">
                        <div class="column-header">
                            <h2>To Do</h2>
                            <span class="task-count" id="todoCount">0</span>
                        </div>
                        <div class="tasks-container" id="todoTasks"></div>
                        <button class="btn-add-task" data-status="todo">+ Add Task</button>
                    </div>

                    <!-- In Progress Column -->
                    <div class="kanban-column" data-status="inprogress">
                        <div class="column-header">
                            <h2>In Progress</h2>
                            <span class="task-count" id="inprogressCount">0</span>
                        </div>
                        <div class="tasks-container" id="inprogressTasks"></div>
                        <button class="btn-add-task" data-status="inprogress">+ Add Task</button>
                    </div>

                    <!-- Done Column -->
                    <div class="kanban-column" data-status="done">
                        <div class="column-header">
                            <h2>Done</h2>
                            <span class="task-count" id="doneCount">0</span>
                        </div>
                        <div class="tasks-container" id="doneTasks"></div>
                        <button class="btn-add-task" data-status="done">+ Add Task</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Task Detail Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <input type="text" id="taskTitle" class="task-title-input" placeholder="Task title">
                <button class="btn-icon" id="closeModalBtn">×</button>
            </div>
            <div class="modal-body">
                <textarea id="taskDescription" class="task-description" placeholder="Add description..."></textarea>
                
                <div class="task-details">
                    <div class="detail-group">
                        <label>Priority</label>
                        <select id="taskPriority" class="input-select">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="detail-group">
                        <label>Due Date</label>
                        <input type="date" id="taskDueDate" class="input-date">
                    </div>
                </div>

                <div class="subtasks-section">
                    <div class="subtasks-header">
                        <h3>Sub-tasks</h3>
                        <button class="btn-icon" id="addSubtaskBtn">+</button>
                    </div>
                    <div class="subtasks-list" id="subtasksList"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="deleteTaskBtn">Delete</button>
                <button class="btn btn-primary" id="saveTaskBtn">Save</button>
            </div>
        </div>
    </div>

    <!-- New Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>New Project</h2>
                <button class="btn-icon" id="closeProjectModalBtn">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="projectName" class="input-text" placeholder="Enter project name" autofocus>
                </div>
                <div class="form-group">
                    <label>Color</label>
                    <div class="color-picker">
                        <input type="radio" name="projectColor" value="#6366f1" checked>
                        <input type="radio" name="projectColor" value="#ec4899">
                        <input type="radio" name="projectColor" value="#f59e0b">
                        <input type="radio" name="projectColor" value="#10b981">
                        <input type="radio" name="projectColor" value="#06b6d4">
                        <input type="radio" name="projectColor" value="#8b5cf6">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" id="cancelProjectBtn">Cancel</button>
                <button class="btn btn-primary" id="saveProjectBtn">Create</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
